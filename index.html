<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usmonov's — Professional CRM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        :root {
            --bg: #0b0c10; --surface: #1a1b23; --accent: #7c6af7; --text: #f0f0f8;
            --green: #22c27a; --blue: #4fa8f5; --red: #f05a5a; --border: #2d2e3d;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Header & Tabs */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #888; font-size: 16px; cursor: pointer; padding: 10px 20px; font-weight: 600; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid var(--border); transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card h3 { font-size: 12px; color: #888; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .card p { font-size: 26px; font-weight: 700; margin: 10px 0 0; }

        /* Form */
        .form-card { background: var(--surface); padding: 25px; border-radius: 16px; margin-bottom: 30px; border: 1px solid var(--border); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 13px; color: #aaa; }
        input, select { background: #252632; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* Table */
        .table-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #252632; padding: 15px; text-align: left; font-size: 13px; color: #888; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-cash { background: rgba(34, 194, 122, 0.1); color: var(--green); }
        .badge-card { background: rgba(79, 168, 245, 0.1); color: var(--blue); }
        .btn-del { color: var(--red); background: none; border: 1px solid #f05a5a40; padding: 5px 10px; border-radius: 6px; cursor: pointer; }
        
        .search-bar { width: 100%; padding: 12px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>USMONOV'S <span style="color:var(--accent)">CRM</span></h1>
        <button onclick="exportToCSV()" style="background:var(--green); border:none; color:white; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:600;">Excelga Eksport</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-main" onclick="showTab('main')">Asosiy Panel</button>
        <button class="tab-btn" id="btn-history" onclick="showTab('history')">To'lovlar Tarixi</button>
    </div>

    <div class="stats-grid">
        <div class="card"><h3>Umumiy Tushum</h3><p id="stat-total" style="color:var(--accent)">0</p></div>
        <div class="card"><h3>O'qituvchilar (80%)</h3><p id="stat-teacher" style="color:var(--green)">0</p></div>
        <div class="card"><h3>Markaz Foydasi (20%)</h3><p id="stat-owner" style="color:var(--blue)">0</p></div>
    </div>

    <div id="main-section">
        <div class="form-card">
            <div class="form-grid">
                <div class="input-group"><label>O'quvchi</label><input type="text" id="name" placeholder="Ism..."></div>
                <div class="input-group"><label>Guruh</label><input type="text" id="group" placeholder="Guruh..."></div>
                <div class="input-group"><label>Summa</label><input type="number" id="amount" placeholder="So'm..."></div>
                <div class="input-group">
                    <label>Turi</label>
                    <select id="type">
                        <option value="Naqd">Naqd</option>
                        <option value="Plastik">Plastik</option>
                    </select>
                </div>
                <button class="btn-add" onclick="saveData()">+ Qo'shish</button>
            </div>
        </div>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="Ism yoki guruh bo'yicha qidirish..." oninput="renderTable()">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Sana</th>
                    <th>O'quvchi</th>
                    <th>Guruh</th>
                    <th>Turi</th>
                    <th>Summa</th>
                    <th>Markaz (20%)</th>
                    <th>Amal</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('usmonovs_v2') || '[]');

    function saveData() {
        const name = document.getElementById('name').value;
        const group = document.getElementById('group').value;
        const amount = parseInt(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        const date = new Date().toLocaleString('uz-UZ', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});

        if(!name || !amount) return alert("Ma'lumotlarni to'ldiring!");

        db.unshift({ name, group: group || '—', amount, type, date });
        localStorage.setItem('usmonovs_v2', JSON.stringify(db));
        
        // Formani tozalash
        document.getElementById('name').value = '';
        document.getElementById('amount').value = '';
        renderTable();
    }

    function renderTable() {
        const query = document.getElementById('search').value.toLowerCase();
        let total = 0;
        let html = '';

        const filtered = db.filter(i => i.name.toLowerCase().includes(query) || i.group.toLowerCase().includes(query));

        filtered.forEach((item, index) => {
            total += item.amount;
            html += `<tr>
                <td style="color:#666; font-size:12px">${item.date}</td>
                <td><b>${item.name}</b></td>
                <td>${item.group}</td>
                <td><span class="badge ${item.type==='Naqd' ? 'badge-cash' : 'badge-card'}">${item.type}</span></td>
                <td>${item.amount.toLocaleString()}</td>
                <td style="color:var(--blue)">${(item.amount * 0.2).toLocaleString()}</td>
                <td><button class="btn-del" onclick="remove(${index})">O'chirish</button></td>
            </tr>`;
        });

        document.getElementById('table-body').innerHTML = html;
        document.getElementById('stat-total').innerText = total.toLocaleString() + " so'm";
        document.getElementById('stat-teacher').innerText = (total * 0.8).toLocaleString() + " so'm";
        document.getElementById('stat-owner').innerText = (total * 0.2).toLocaleString() + " so'm";
    }

    function remove(idx) {
        if(confirm("Ushbu to'lov o'chirilsinmi?")) {
            db.splice(idx, 1);
            localStorage.setItem('usmonovs_v2', JSON.stringify(db));
            renderTable();
        }
    }

    function exportToCSV() {
        let csv = "Sana,O'quvchi,Guruh,Turi,Jami,Markaz(20%)\n";
        db.forEach(i => { csv += `${i.date},${i.name},${i.group},${i.type},${i.amount},${i.amount*0.2}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Usmonovs_Hisobot.csv";
        link.click();
    }

    function showTab(tab) {
        document.getElementById('btn-main').classList.toggle('active', tab==='main');
        document.getElementById('btn-history').classList.toggle('active', tab==='history');
        // Bu yerga kelajakda boshqa tablar uchun funksiya qo'shish mumkin
    }

    renderTable();
</script>

</body>
</html>
