<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usmonov's CRM Premium</title>
    <style>
        :root {
            --bg: #0b111d; --card: #162231; --accent: #19c3b0; --gold: #c5a359;
            --text: #f8fafc; --muted: #94a3b8; --border: #2d3e50; --red: #ef4444; --green: #22c55e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 50px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #222; }
        
        /* Stats Grid */
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--accent); transition: 0.3s; }
        .stat-card h5 { margin: 0; font-size: 10px; color: var(--muted); text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-weight: bold; font-size: 13px; color: var(--text); }

        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #080c14; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: var(--muted); cursor: pointer; border-radius: 10px; font-weight: bold; font-size: 12px; }
        .tab-btn.active { background: var(--accent); color: white; }

        /* Sections */
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Form */
        .form-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 11px; color: var(--gold); }
        input { width: 100%; padding: 12px; background: #0b111d; border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        .save-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* History Items */
        .item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .item-info b { display: block; font-size: 15px; margin-bottom: 3px; }
        .item-info span { font-size: 11px; color: var(--muted); }
        .item-price { text-align: right; }
        .item-price .paid { color: var(--accent); font-weight: bold; display: block; }
        .item-price .debt { color: var(--red); font-size: 11px; }
        .del-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; margin-left: 10px; }

        #loader { display: none; text-align: center; color: var(--gold); margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-box">
            <img src="logo.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3354/3354544.png'" class="logo">
            <div>
                <div style="font-weight: 800; font-size: 16px;">USMONOV'S <span style="color:var(--accent)">CRM</span></div>
                <div style="font-size: 9px; color: var(--gold); letter-spacing: 1px;">PREMIUM SYSTEM</div>
            </div>
        </div>
        <div style="text-align: right">
            <div style="color:var(--green); font-size: 10px;">● ONLINE</div>
            <div id="current-date" style="font-size: 9px; color: var(--muted);"></div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card"><h5>Tushum</h5><p id="stat-paid">0</p></div>
        <div class="stat-card" style="border-bottom-color: var(--gold)"><h5>O'quvchi</h5><p id="stat-count">0</p></div>
        <div class="stat-card" style="border-bottom-color: var(--red)"><h5>Qarz</h5><p id="stat-debt">0</p></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'add-page')">QABUL</button>
        <button class="tab-btn" onclick="switchTab(event, 'list-page')">TARIX</button>
        <button class="tab-btn" onclick="switchTab(event, 'debt-page')">QARZDORLAR</button>
    </div>

    <div id="add-page" class="section active">
        <div class="form-card">
            <div class="input-group">
                <label>O'QUVCHI ISMI</label>
                <input type="text" id="in-name" placeholder="F.I.Sh.">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <div class="input-group" style="margin:0">
                    <label>KURS NARXI</label>
                    <input type="number" id="in-price" placeholder="So'm">
                </div>
                <div class="input-group" style="margin:0">
                    <label>TO'LANDI</label>
                    <input type="number" id="in-paid" placeholder="So'm">
                </div>
            </div>
            <button class="save-btn" id="btn-save" onclick="handleSave()">MA'LUMOTNI SAQLASH</button>
            <div id="loader">Google Sheets bilan sinxronlanmoqda...</div>
        </div>
    </div>

    <div id="list-page" class="section">
        <div id="history-list"></div>
    </div>

    <div id="debt-page" class="section">
        <div id="debt-list"></div>
    </div>
</div>

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzUk_s4ay3W5eQzAthBdnAbE36WCa3rUXJN0WLfyrakHxGBBFoKAx-0gPUGqnKVotLsdA/exec";
    let database = JSON.parse(localStorage.getItem('usmonov_crm_final_v1') || '[]');

    function switchTab(e, id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
        renderAll();
    }

    async function handleSave() {
        const name = document.getElementById('in-name').value;
        const price = parseInt(document.getElementById('in-price').value) || 0;
        const paid = parseInt(document.getElementById('in-paid').value) || 0;
        const btn = document.getElementById('btn-save');
        const loader = document.getElementById('loader');

        if(!name || price <= 0) return alert("Ism va narxni kiriting!");

        const entry = {
            id: Date.now(),
            date: new Date().toLocaleDateString('uz-UZ'),
            name: name,
            price: price,
            paid: paid,
            debt: price - paid
        };

        btn.disabled = true;
        loader.style.display = "block";

        try {
            await fetch(SHEETS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(entry) });
            database.unshift(entry);
            localStorage.setItem('usmonov_crm_final_v1', JSON.stringify(database));
            
            document.getElementById('in-name').value = '';
            document.getElementById('in-price').value = '';
            document.getElementById('in-paid').value = '';
            
            alert("Muvaffaqiyatli saqlandi!");
            renderAll();
        } catch (e) {
            alert("Xatolik! Internetni tekshiring.");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }

    function renderAll() {
        let historyHtml = '', debtHtml = '', totalPaid = 0, totalDebt = 0;
        
        database.forEach((item, index) => {
            totalPaid += item.paid;
            totalDebt += item.debt;

            let card = `
                <div class="item">
                    <div class="item-info">
                        <b>${item.name}</b>
                        <span>${item.date}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <div class="item-price">
                            <span class="paid">${item.paid.toLocaleString()}</span>
                            ${item.debt > 0 ? `<span class="debt">Qarz: ${item.debt.toLocaleString()}</span>` : '<span style="color:var(--green); font-size:10px;">To\'liq</span>'}
                        </div>
                        <button class="del-btn" onclick="removeItem(${index})">&times;</button>
                    </div>
                </div>`;
            
            historyHtml += card;
            if(item.debt > 0) debtHtml += card;
        });

        document.getElementById('history-list').innerHTML = historyHtml || '<p style="text-align:center; color:var(--muted)">Tarix bo\'sh</p>';
        document.getElementById('debt-list').innerHTML = debtHtml || '<p style="text-align:center; color:var(--green)">Qarzdorlar yo\'q!</p>';
        document.getElementById('stat-paid').innerText = totalPaid.toLocaleString();
        document.getElementById('stat-count').innerText = database.length;
        document.getElementById('stat-debt').innerText = totalDebt.toLocaleString();
    }

    function removeItem(index) {
        if(confirm("Ushbu yozuvni o'chirmoqchimisiz?")) {
            database.splice(index, 1);
            localStorage.setItem('usmonov_crm_final_v1', JSON.stringify(database));
            renderAll();
        }
    }

    document.getElementById('current-date').innerText = new Date().toLocaleDateString('uz-UZ', {month:'long', year:'numeric'}).toUpperCase();
    renderAll();
</script>
</body>
</html>
