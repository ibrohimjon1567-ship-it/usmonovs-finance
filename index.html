<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usmonov's CRM Pro — Tarix va Statistika</title>
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --accent: #66fcf1; --text: #c5c6c7; --green: #45a29e; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Menu Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #1a1a1a; color: white; border: 1px solid var(--accent); padding: 10px 20px; border-radius: 5px; cursor: pointer; flex: 1; }
        .tab-btn.active { background: var(--accent); color: black; font-weight: bold; }

        .section { display: none; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #45a29e; }
        .section.active { display: block; }

        /* Stats Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #0b0c10; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }

        /* Forms & Tables */
        input, select { background: #1a1a1a; border: 1px solid #45a29e; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        button.main-btn { background: var(--accent); color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #45a29e; }
        th { color: var(--accent); text-transform: uppercase; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; }
        .bg-red { background: rgba(255, 77, 77, 0.2); color: var(--red); }
        .bg-green { background: rgba(102, 252, 241, 0.2); color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h2>USMONOV'S <span style="color:var(--accent)">PRO CRM</span></h2>

    <div class="grid">
        <div class="stat-card"><h5>Jami Tushum</h5><p id="t-total">0</p></div>
        <div class="stat-card"><h5>O'quvchilar</h5><p id="t-count">0</p></div>
        <div class="stat-card"><h5>Jami Qarz</h5><p id="t-debt">0</p></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('add')">Kiritish</button>
        <button class="tab-btn" onclick="showTab('history')">Tarix</button>
        <button class="tab-btn" onclick="showTab('stats')">Statistika</button>
    </div>

    <div id="add" class="section active">
        <h3>Yangi to'lov qo'shish</h3>
        <input type="text" id="name" placeholder="O'quvchi ismi">
        <input type="number" id="price" placeholder="Kurs narxi (masalan: 500000)">
        <input type="number" id="paid" placeholder="To'langan summa">
        <select id="type"><option value="Naqd">Naqd</option><option value="Plastik">Plastik</option></select>
        <button class="main-btn" onclick="saveData()">SAQLASH VA BULUTGA YUBORISH</button>
    </div>

    <div id="history" class="section">
        <h3>Barcha to'lovlar tarixi</h3>
        <table>
            <thead><tr><th>Sana</th><th>O'quvchi</th><th>Summa</th><th>Tur</th><th>Amal</th></tr></thead>
            <tbody id="history-list"></tbody>
        </table>
    </div>

    <div id="stats" class="section">
        <h3>O'quvchilar balansi</h3>
        <table>
            <thead><tr><th>O'quvchi</th><th>Jami To'lov</th><th>Qarz</th><th>Holat</th></tr></thead>
            <tbody id="stats-list"></tbody>
        </table>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzUk_s4ay3W5eQzAthBdnAbE36WCa3rUXJN0WLfyrakHxGBBFoKAx-0gPUGqnKVotLsdA/exec";
    let data = JSON.parse(localStorage.getItem('usmonovs_v4') || '[]');

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
        render();
    }

    async function saveData() {
        const name = document.getElementById('name').value;
        const price = parseInt(document.getElementById('price').value) || 0;
        const paid = parseInt(document.getElementById('paid').value) || 0;
        const type = document.getElementById('type').value;
        const date = new Date().toLocaleDateString();

        if(!name || price <= 0) return alert("Ma'lumot to'liq emas!");

        const newItem = { date, name, price, paid, debt: price - paid, type };
        
        // 1. Bulutga yuborish
        fetch(GOOGLE_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newItem) });

        // 2. Mahalliy saqlash
        data.unshift(newItem);
        localStorage.setItem('usmonovs_v4', JSON.stringify(data));
        
        alert("Saqlandi!");
        render();
    }

    function render() {
        let hList = '', sList = '', totalPaid = 0, totalDebt = 0;
        let studentsObj = {};

        data.forEach((item, index) => {
            totalPaid += item.paid;
            totalDebt += item.debt;

            // Tarix ro'yxati
            hList += `<tr><td>${item.date}</td><td>${item.name}</td><td style="color:var(--accent)">${item.paid.toLocaleString()}</td><td>${item.type}</td><td><button onclick="del(${index})" style="color:red; background:none; border:none; cursor:pointer;">X</button></td></tr>`;

            // Statistika uchun hisoblash
            if(!studentsObj[item.name]) {
                studentsObj[item.name] = { total: 0, debt: 0 };
            }
            studentsObj[item.name].total += item.paid;
            studentsObj[item.name].debt += item.debt;
        });

        // Statistika ro'yxati
        for(let name in studentsObj) {
            let s = studentsObj[name];
            sList += `<tr><td>${name}</td><td>${s.total.toLocaleString()}</td><td style="color:${s.debt > 0 ? 'var(--red)' : 'var(--accent)'}">${s.debt.toLocaleString()}</td><td><span class="badge ${s.debt > 0 ? 'bg-red' : 'bg-green'}">${s.debt > 0 ? 'Qarz' : 'To\'liq'}</span></td></tr>`;
        }

        document.getElementById('history-list').innerHTML = hList;
        document.getElementById('stats-list').innerHTML = sList;
        document.getElementById('t-total').innerText = totalPaid.toLocaleString() + " so'm";
        document.getElementById('t-count').innerText = Object.keys(studentsObj).length + " ta";
        document.getElementById('t-debt').innerText = totalDebt.toLocaleString() + " so'm";
    }

    function del(i) { if(confirm("O'chirilsinmi?")) { data.splice(i,1); localStorage.setItem('usmonovs_v4', JSON.stringify(data)); render(); } }
    render();
</script>
</body>
</html>
